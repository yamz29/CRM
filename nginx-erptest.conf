# ─────────────────────────────────────────────────────────────
# Nginx — erptest.gonzalva.com.do  →  localhost:3001
#
# Pasos para activar en el VPS:
#   sudo cp nginx-erptest.conf /etc/nginx/sites-available/erptest.gonzalva.com.do
#   sudo ln -s /etc/nginx/sites-available/erptest.gonzalva.com.do \
#              /etc/nginx/sites-enabled/erptest.gonzalva.com.do
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Después de activar, obtener SSL con Certbot:
#   sudo certbot --nginx -d erptest.gonzalva.com.do
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name erptest.gonzalva.com.do;

    # Tamaño máximo para subida de archivos (ajustar si usan adjuntos grandes)
    client_max_body_size 20M;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}

# Certbot agregará el bloque HTTPS (port 443) aquí automáticamente
